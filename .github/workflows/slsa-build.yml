name: 🏗️ SLSA Build Provenance
on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Name of the artifact to generate provenance for'
        required: true
        type: string
    outputs:
      provenance-subject:
        description: 'Base64-encoded provenance subject for SLSA generator'
        value: ${{ jobs.slsa-builder.outputs.subject }}

permissions:
  id-token: write
  contents: read

jobs:
  slsa-builder:
    name: 🧬 Generate SLSA Provenance Subject
    runs-on: ubuntu-latest
    outputs:
      subject: ${{ steps.subject.outputs.subject }}
    steps:
      - name: 📦 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: artifacts/

      - name: 📝 Generate provenance subject
        id: subject
        run: |
          # Install required tools
          sudo apt-get update
          sudo apt-get install -y jq

          # Create directory for provenance
          mkdir -p provenance

          # Generate checksums and create provenance subject
          cd artifacts/

          # Create a list of all artifacts with their checksums
          echo "Generating file checksums and provenance metadata..."
          
          # Build JSON properly using jq
          artifacts_json="[]"
          for file in $(find . -type f ! -name '.*' | sort); do
            file_hash=$(sha256sum "$file" | awk '{print $1}')
            file_size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null || echo "0")
            file_name=$(basename "$file")
            
            artifacts_json=$(echo "$artifacts_json" | jq \
              --arg name "$file_name" \
              --arg hash "$file_hash" \
              --argjson size "$file_size" \
              '. += [{"name": $name, "sha256": $hash, "size": $size}]')
          done
          
          # Create the final provenance JSON
          cat > ../provenance/subject.json <<EOF
          {
            "artifacts": $(echo "$artifacts_json" | jq -c .),
            "build_metadata": {
              "repository": "${{ github.repository }}",
              "commit_sha": "${{ github.sha }}",
              "ref": "${{ github.ref }}",
              "workflow": "${{ github.workflow }}",
              "workflow_path": "${{ github.workflow_ref }}",
              "event": "${{ github.event_name }}"
            }
          }
          EOF

          # Convert to base64 for SLSA framework
          subject_b64=$(cat ../provenance/subject.json | base64 -w0)
          echo "subject=$subject_b64" >> $GITHUB_OUTPUT
          
          # Also save pretty-printed version for inspection
          jq . ../provenance/subject.json > ../provenance/subject-pretty.json
          
          echo "Provenance subject generated successfully"
          echo "Files included:"
          find . -type f ! -name '.*' | sort

      - name: ☁️ Upload provenance metadata
        uses: actions/upload-artifact@v4
        with:
          name: slsa-build-provenance-metadata
          path: provenance/
          retention-days: 5
