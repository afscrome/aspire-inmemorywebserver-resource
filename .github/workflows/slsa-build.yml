name: 🏗️ SLSA Build Provenance
on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Name of the artifact to generate provenance for'
        required: true
        type: string
    outputs:
      provenance-subject:
        description: 'Base64-encoded provenance subject for SLSA generator'
        value: ${{ jobs.slsa-builder.outputs.subject }}

permissions:
  id-token: write
  contents: read

jobs:
  slsa-builder:
    name: 🧬 Generate SLSA Provenance Subject
    runs-on: ubuntu-latest
    outputs:
      subject: ${{ steps.subject.outputs.subject }}
    steps:
      - name: 📦 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: artifacts/

      - name: 📝 Generate provenance subject
        id: subject
        run: |
          # Create directory for provenance
          mkdir -p provenance

          # Generate checksums in sha256sum format (expected by SLSA)
          cd artifacts/

          # Create a sha256sum format file (standard from sha256sum command)
          echo "Generating file checksums for SLSA provenance..."
          
          sha256sum $(find . -type f ! -name '.*' | sort) > ../provenance/subject.sha256sum
          
          # Convert to base64 for SLSA framework
          subject_b64=$(cat ../provenance/subject.sha256sum | base64 -w0)
          echo "subject=$subject_b64" >> $GITHUB_OUTPUT
          
          echo "Provenance subject generated successfully"
          echo "SLSA Subjects (sha256sum format):"
          cat ../provenance/subject.sha256sum

      - name: ☁️ Upload provenance metadata
        uses: actions/upload-artifact@v4
        with:
          name: slsa-build-provenance-metadata
          path: provenance/
          retention-days: 5
