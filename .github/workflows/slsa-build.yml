name: 🏗️ SLSA Build Provenance
on:
  workflow_call:
    inputs:
      artifact-name:
        description: 'Name of the artifact to generate provenance for'
        required: true
        type: string
    outputs:
      provenance-subject:
        description: 'Base64-encoded provenance subject for SLSA generator'
        value: ${{ jobs.slsa-builder.outputs.subject }}

permissions:
  id-token: write
  contents: read

jobs:
  slsa-builder:
    name: 🧬 Generate SLSA Provenance Subject
    runs-on: ubuntu-latest
    outputs:
      subject: ${{ steps.subject.outputs.subject }}
    steps:
      - name: 📦 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: artifacts/

      - name: 📝 Generate provenance subject
        id: subject
        run: |
          # Install required tools
          sudo apt-get update
          sudo apt-get install -y jq

          # Create directory for provenance
          mkdir -p provenance

          # Generate checksums and create provenance subject in SLSA format
          cd artifacts/

          # Create a list of all artifacts with their checksums in SLSA format
          echo "Generating file checksums and provenance metadata..."
          
          # Build SLSA subjects JSON array (SLSA format requires uri and digest)
          subjects_json="[]"
          
          for file in $(find . -type f ! -name '.*' | sort); do
            file_hash=$(sha256sum "$file" | awk '{print $1}')
            
            # Create subject entry in SLSA format
            # uri format: can be a simple path or full URI
            subjects_json=$(echo "$subjects_json" | jq \
              --arg uri "$file" \
              --arg hash "$file_hash" \
              '. += [{"uri": $uri, "digest": {"sha256": $hash}}]')
          done
          
          # Save subjects in SLSA-compliant format
          echo "$subjects_json" | jq . > ../provenance/subject.json
          
          # Convert to base64 for SLSA framework
          subject_b64=$(cat ../provenance/subject.json | base64 -w0)
          echo "subject=$subject_b64" >> $GITHUB_OUTPUT
          
          echo "Provenance subject generated successfully"
          echo "SLSA Subjects:"
          jq . ../provenance/subject.json
          echo ""
          echo "Files included:"
          find . -type f ! -name '.*' | sort

      - name: ☁️ Upload provenance metadata
        uses: actions/upload-artifact@v4
        with:
          name: slsa-build-provenance-metadata
          path: provenance/
          retention-days: 5
